[timing.intervals]
sample = 350
adjust = 160000

[gpu-usage]
fix-metrics = true
method = "busy-flag"
flush-every = 10

[gpu]
set-method = "smu"

[dbus]
enabled = true

[frequency-range]
min = 350
max = 2000

[timing.ramp-rates]
normal = 2
burst = 45

[timing]
burst-samples = 60
down-events = 6

[frequency-thresholds]
adjust = 10

[load-target]
upper = 0.93
lower = 0.72

[temperature]
throttling = 85
throttling_recovery = 75

