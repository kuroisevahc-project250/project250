# us
[timing.intervals]
sample = 500
adjust = 200_000

[gpu-usage]
fix-metrics = true
method = "busy-flag" # "busy-flag" or "process"
flush-every = 10

[gpu]
set-method = "smu"  # "smu" or "kernel"

[dbus]
enabled = true

# MHz/ms
[timing.ramp-rates]
normal = 1
burst = 50

# number of samples
[timing]
burst-samples = 60
down-events = 5

# MHz
[frequency-thresholds]
adjust = 10

# %
[load-target]
upper = 0.65
lower = 0.50

#°C
[temperature]
throttling = 85
throttling_recovery = 75

[[safe-points]]
frequency = 1000
voltage = 800


[[safe-points]]
frequency = 1500
voltage = 900

[[safe-points]]
frequency = 1600
voltage = 920

[[safe-points]]
frequency = 1700
voltage = 930

[[safe-points]]
frequency = 1850
voltage = 950

[[safe-points]]
frequency = 2000
voltage = 960



# Optional: set initial frequency range limits
# Both min and max can be omitted or set to 0 for no limit
# [frequency-range]
# min = 1000    # MHz
# max = 2200   # MHz


